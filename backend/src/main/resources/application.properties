# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration - Using H2 for Development
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# PostgreSQL Configuration (uncomment to use PostgreSQL instead)
# spring.datasource.url=jdbc:postgresql://localhost:5432/astrolog
# spring.datasource.username=postgres
# spring.datasource.password=password
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# AstronomyAPI Configuration
# Option 1: Basic Authentication (Application ID + Secret) - RECOMMENDED
astronomy.api.id="e558b2a5-8b55-4887-aad4-ff28daf91848"
astronomy.api.secret="22d4931b0aeffd26491f8ad7bc12b1e80051e261ace12c49bc06e77ba41e9778f5e744b5f6659fd9d7634f2418d457a47de94102b9ca29c4421fc9f15c690d3a4c5304b767c5a511df5585abd5a31a119180aa7a91da8de7cc448ec676de4cfad5a93254e3917294b39b077ca830df4d"

# Option 2: API Key Authentication (Bearer Token) - Alternative
# astronomy.api.key=${ASTRONOMY_API_KEY:your-api-key-here}

astronomy.api.base-url=https://api.astronomyapi.com/api/v2

# Image Storage Configuration
storage.type=local
storage.local.path=./uploads
# storage.type=s3
# storage.s3.bucket-name=your-bucket-name
# storage.s3.region=us-east-1

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:3001
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Logging
logging.level.root=INFO
logging.level.com.astrolog=DEBUG

